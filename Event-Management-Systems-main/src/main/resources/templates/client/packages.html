<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/dashboard :: page(~{fragments/sidebar-client :: sidebar}, ~{::content})}">
<body>
<div th:fragment="content">
    <h4 class="mb-4">Available Packages</h4>
    <div class="row g-4">
        <div class="col-lg-4 col-md-6" th:each="pkg : ${packages}">
            <div class="card package-card">
                <img class="card-img-top" th:src="${pkg.coverImage} ?: 'https://picsum.photos/seed/pkg' + ${pkg.id} + '/600/400'" alt="">
                <div class="card-body d-flex flex-column">
                    <span class="badge bg-success mb-2" th:if="${pkg.category}" th:text="${pkg.category.name}">Cat</span>
                    <h5 th:text="${pkg.name}">Name</h5>
                    <p class="small text-muted" th:text="${#strings.abbreviate(pkg.description,90)}">desc</p>
                    <div class="mt-auto">
                        <div class="price-tag mb-2" th:text="'৳ ' + ${#numbers.formatDecimal(pkg.finalPrice,1,'COMMA',0,'POINT')}">৳0</div>
                        <a th:href="@{/client/customize(packageId=${pkg.id})}" class="btn btn-success w-100"><i class="bi bi-sliders me-1"></i>Customize &amp; Book</a>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-12 text-center text-muted py-4" th:if="${#lists.isEmpty(packages)}">No packages available</div>
    </div>
</div>
</body>
</html>

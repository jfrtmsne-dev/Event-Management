<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Packages')}"></head>
<body>
<nav th:replace="~{fragments/public-navbar :: navbar('packages')}"></nav>

<section class="section" style="padding-top:130px;">
    <div class="container">
        <div class="text-center">
            <div class="divider-accent"></div>
            <h2 class="section-title">Our Packages</h2>
            <p class="section-subtitle">Choose a ready-made package or build your own</p>
        </div>

        <div class="row g-4">
            <div class="col-lg-4 col-md-6" th:each="pkg : ${packages}">
                <div class="card package-card">
                    <img class="card-img-top" th:src="${pkg.coverImage} ?: 'https://picsum.photos/seed/pkg' + ${pkg.id} + '/600/400'" alt="Package">
                    <div class="card-body d-flex flex-column">
                        <span class="badge bg-primary-purple mb-2" th:if="${pkg.category}" th:text="${pkg.category.name}">Category</span>
                        <h5 class="card-title" th:text="${pkg.name}">Package</h5>
                        <p class="text-muted small" th:text="${#strings.abbreviate(pkg.description,100)}">desc</p>
                        <ul class="list-unstyled small text-muted mb-3">
                            <li th:if="${pkg.decoration}"><i class="bi bi-check2 text-success me-1"></i>Decoration</li>
                            <li th:if="${pkg.catering}"><i class="bi bi-check2 text-success me-1"></i>Catering</li>
                            <li th:if="${pkg.photography}"><i class="bi bi-check2 text-success me-1"></i>Photography</li>
                            <li><i class="bi bi-people me-1"></i><span th:text="${pkg.guestCapacity}">0</span> guests</li>
                        </ul>
                        <div class="mt-auto">
                            <div class="d-flex align-items-end gap-2 mb-2">
                                <span class="price-tag" th:text="'৳ ' + ${#numbers.formatDecimal(pkg.finalPrice,1,'COMMA',0,'POINT')}">৳0</span>
                                <span class="old-price" th:if="${pkg.discountPercent != null and pkg.discountPercent.signum() > 0}"
                                      th:text="'৳ ' + ${#numbers.formatDecimal(pkg.basePrice,1,'COMMA',0,'POINT')}">৳0</span>
                            </div>
                            <div class="d-flex gap-2">
                                <a th:href="@{'/packages/' + ${pkg.id}}" class="btn btn-outline-purple flex-fill" style="border-color:var(--primary);color:var(--primary);">Details</a>
                                <a th:href="@{'/booking'(packageId=${pkg.id})}" class="btn btn-purple flex-fill">Book</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-12 text-center text-muted py-5" th:if="${#lists.isEmpty(packages)}">
                <i class="bi bi-box display-4 d-block mb-2"></i>
                <p>No packages available yet. Please check back soon.</p>
            </div>
        </div>
    </div>
</section>

<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
